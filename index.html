<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚽ OLMALIQ STADION - Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary-green: #2ecc71; --danger-red: #e74c3c; --admin-gold: #f1c40f; --glass-border: rgba(255, 255, 255, 0.2); }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: url('https://integralspor.com/assets/filemanager/200c60217abc6599765d48ca523220b3.jpg') no-repeat center center fixed; background-size: cover; color: #fff; display: flex; justify-content: center; min-height: 100vh; }
        .container { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px); width: 95%; max-width: 1100px; margin: 20px auto; border-radius: 25px; padding: 30px; border: 1px solid var(--glass-border); box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid var(--glass-border); padding-bottom: 20px; }
        h2 { font-weight: 800; font-size: clamp(20px, 5vw, 32px); background: linear-gradient(to right, #2ecc71, #f1c40f); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; margin: 0; }
        .admin-badge { background: var(--admin-gold); color: #000; padding: 5px 15px; border-radius: 50px; font-size: 12px; font-weight: bold; display: none; margin-bottom: 10px; }
        .controls { display: flex; gap: 15px; justify-content: center; margin-bottom: 30px; flex-wrap: wrap; }
        select, input, .login-btn { background: rgba(255, 255, 255, 0.1); border: 1px solid var(--glass-border); color: #fff; padding: 12px; border-radius: 12px; font-size: 16px; outline: none; transition: 0.3s; }
        select option { background: #1a1a1a; color: #fff; }
        .login-btn { background: var(--primary-green); font-weight: 600; cursor: pointer; border: none; min-width: 120px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .slot { padding: 25px 10px; border-radius: 15px; text-align: center; transition: 0.3s; border: 1px solid transparent; cursor: pointer; }
        .free { background: rgba(46, 204, 113, 0.15); border-color: rgba(46, 204, 113, 0.3); }
        .booked { background: rgba(231, 76, 60, 0.3); border-color: rgba(231, 76, 60, 0.5); cursor: not-allowed; }
        .admin-mode .booked { cursor: pointer; border-color: var(--admin-gold); }
        .time { font-size: 24px; font-weight: 800; display: block; }
        .status { font-size: 11px; letter-spacing: 1.5px; opacity: 0.9; text-transform: uppercase; }
        .info { font-size: 12px; margin-top: 10px; color: var(--admin-gold); background: rgba(0,0,0,0.5); border-radius: 8px; padding: 5px; font-weight: 500; word-break: break-word; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: #1a1a1a; padding: 30px; border-radius: 20px; border: 1px solid var(--primary-green); width: 90%; max-width: 400px; text-align: center; }
        .modal-content input { width: 90%; margin-bottom: 15px; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #222; color: #fff; font-size: 16px; }
        .modal-btns { display: flex; gap: 10px; justify-content: center; }
        .save-btn { background: var(--primary-green); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .cancel-btn { background: #555; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        .footer-note { text-align: center; margin-top: 40px; padding: 25px; background: rgba(255, 255, 255, 0.05); border-radius: 20px; border: 1px dashed var(--glass-border); }
        @media (max-width: 500px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body id="bodyTag">
    <div id="modal">
        <div class="modal-content">
            <h3 id="modalTitle" style="margin-top:0">Брон қилиш</h3>
            <input type="text" id="userName" placeholder="Исмингиз">
            <input type="tel" id="userPhone" placeholder="Телефон рақамингиз (+998...)">
            <div class="modal-btns">
                <button class="save-btn" onclick="confirmBooking()">Тасдиқлаш</button>
                <button class="cancel-btn" onclick="closeModal()">Бекор қилиш</button>
            </div>
        </div>
    </div>
    <div class="container">
        <header>
            <div id="adminBadge" class="admin-badge">⚡ ADMIN REJIM YOQILGAN</div>
            <h2>⚽ OLMALIQ STADION</h2>
            <p style="opacity: 0.7; font-size: 12px; letter-spacing: 1px; margin-top: 5px;">ОНЛАЙН БРОН ҚИЛИШ ТИЗИМИ</p>
        </header>
        <div class="controls">
            <select id="stadiumSelect" onchange="loadSchedule()">
                <option value="stadion_1">🏟 Tennis maydoni yonidagi</option>
                <option value="stadion_2">🏟 Go'zal to'yxonasi yonidagi</option>
                <option value="stadion_3">🏟 Ximik yopiq stadioni</option>
                <option value="stadion_4">🏟 Eski stadion yonidagi</option>
                <option value="stadion_5">🏟 Бунёдкор</option>
                <option value="stadion_6">🏟 Олмалиқ Сити</option>
                <option value="stadion_7">🏟 7-Микрорайон</option>
                <option value="stadion_8">🏟 Ёшлик</option>
                <option value="stadion_9">🏟 Наврўз</option>
                <option value="stadion_10">🏟 Гвардия</option>

            </select>
            <input type="date" id="dateSelect" onchange="loadSchedule()">
            <button id="authBtn" class="login-btn" onclick="toggleAdmin()">🔑 Админ</button>
        </div>
        <div class="grid" id="scheduleGrid"></div>
        <div class="footer-note">
            📢 САВОЛЛАР УЧУН: <br>
            <b style="font-size: 22px; color: var(--primary-green);">+998 93 793 11 55</b>
        </div>
    </div>
    <script>
        const firebaseConfig = { databaseURL: "https://olmaliq-stadion-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let isAdmin = false;
        let selectedSlot = null;
        const ADMIN_PASSWORD = "1872"; 
        document.getElementById('dateSelect').valueAsDate = new Date();
        function toggleAdmin() {
            if (!isAdmin) {
                let pass = prompt("Админ паролини киритинг:");
                if (pass === ADMIN_PASSWORD) {
                    isAdmin = true;
                    document.getElementById('bodyTag').classList.add('admin-mode');
                    document.getElementById('adminBadge').style.display = "inline-block";
                    document.getElementById('authBtn').innerText = "🚪 Чиқиш";
                } else { alert("Парол хато!"); }
            } else {
                isAdmin = false;
                document.getElementById('bodyTag').classList.remove('admin-mode');
                document.getElementById('adminBadge').style.display = "none";
                document.getElementById('authBtn').innerText = "🔑 Админ";
            }
            loadSchedule();
        }
        function openModal(stadium, date, time) {
            selectedSlot = { stadium, date, time };
            document.getElementById('modalTitle').innerText = time + " учун брон";
            document.getElementById('modal').style.display = 'flex';
        }
        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('userName').value = '';
            document.getElementById('userPhone').value = '';
        }
        function confirmBooking() {
            const name = document.getElementById('userName').value;
            const phone = document.getElementById('userPhone').value;
            if (name && phone) {
                const key = selectedSlot.time.replace(':', '_');
                database.ref(`bookings/${selectedSlot.stadium}/${selectedSlot.date}/${key}`).set(`${name} (${phone})`);
                closeModal();
                alert("Муваффақиятли банд қилинди!");
            } else { alert("Илтимос, барча майдонларни тўлдиринг!"); }
        }
        function loadSchedule() {
            const stadium = document.getElementById('stadiumSelect').value;
            const date = document.getElementById('dateSelect').value;
            const grid = document.getElementById('scheduleGrid');
            if (!date) return;
            grid.innerHTML = '<p style="grid-column: 1/-1; text-align:center; opacity:0.5;">Юкланмоқда...</p>';
            database.ref(`bookings/${stadium}/${date}`).on('value', (snapshot) => {
                grid.innerHTML = '';
                const data = snapshot.val() || {};
                for (let i = 1; i <= 24; i++) {
                    let time = i + ":00";
                    let key = time.replace(':', '_');
                    let info = data[key];
                    let div = document.createElement('div');
                    div.className = 'slot ' + (info ? 'booked' : 'free');
                    div.innerHTML = `<span class="time">${time}</span><span class="status">${info ? '● БАНД' : '○ БЎШ'}</span>${info ? `<div class="info">👤 ${info}</div>` : ''}`;
                    div.onclick = () => {
                        if (isAdmin) {
                            if (info) {
                                if(confirm(time + " бронни бекор қиламизми?")) database.ref(`bookings/${stadium}/${date}/${key}`).remove();
                            } else { openModal(stadium, date, time); }
                        } else if (!info) { openModal(stadium, date, time); } else { alert("Бу вақт банд!"); }
                    };
                    grid.appendChild(div);
                }
            });
        }
        loadSchedule();
    </script>
</body>
</html>
